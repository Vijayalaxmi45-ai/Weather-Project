<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard | WeatherProject</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Premium Navbar -->
    <nav class="navbar px-lg-5">
        <a class="navbar-brand" href="index.html">
            <i class="bi bi-cloud-sun me-2"></i>WeatherProject
        </a>
        <div class="d-none d-md-flex">
            <ul class="nav-links mb-0">
                <li><a href="index.html">Home</a></li>
                <li><a href="weather.html" class="active">Explore Cities</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
        <div class="d-flex align-items-center gap-3">
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">
                <i class="bi bi-moon-stars"></i>
            </button>
        </div>
    </nav>

    <main class="container py-5 text-center">
        <h1 class="display-5 fw-bold mb-4">Explore Global Weather</h1>
        <p class="text-secondary mb-5">Access deep data for over 100,000+ cities and regions worldwide.</p>

        <div class="search-container mx-auto" style="max-width: 700px;">
            <div class="input-group input-group-lg shadow-sm border p-1 rounded-4 bg-white overflow-hidden">
                <input id="cityInput" type="text" class="form-control border-0 px-4 search-input" placeholder="Search major cities (e.g., Paris, Mumbai, Tokyo, NYC)...">
                <button class="btn btn-premium px-5" onclick="getWeather()">Search</button>
            </div>
            <div id="search-history" class="mt-4">
                <!-- recent history injected here -->
            </div>
        </div>

        <div id="weather-display-area" class="mt-5 mx-auto" style="max-width: 900px;">
            <!-- main weather results -->
        </div>

        <!-- Predefined Regional Insights -->
        <h3 class="fw-bold mt-5 mb-4">Popular Global Spots</h3>
        <div class="row g-4 justify-content-center">
            <div class="col-6 col-md-3">
                <div class="glass-card shadow-sm p-3 cursor-pointer" onclick="fetchWeather('London')">
                    <h6 class="mb-0 fw-bold">London, UK</h6>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="glass-card shadow-sm p-3 cursor-pointer" onclick="fetchWeather('Tokyo')">
                    <h6 class="mb-0 fw-bold">Tokyo, JP</h6>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="glass-card shadow-sm p-3 cursor-pointer" onclick="fetchWeather('New York')">
                    <h6 class="mb-0 fw-bold">NYC, USA</h6>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="glass-card shadow-sm p-3 cursor-pointer" onclick="fetchWeather('Dubai')">
                    <h6 class="mb-0 fw-bold">Dubai, UAE</h6>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <div class="small text-muted">&copy; 2026 WeatherProject | By Vijayalaxmi Kamble</div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
